<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Almanac{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">🧭 Almanac</a>
    <div class="stats">
      <span class="stat streak" title="Day streak">🔥 {{ streak | default(0) }}</span>
      <span class="stat xp" title="Total XP">⭐ {{ xp | default(0) }} XP</span>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
